name: Database Backup

on:
  schedule:
    - cron: '0 9 * * *'  # 09:00 UTC daily (= 03:00 MDT)
  workflow_dispatch:      # also allow manual trigger from the Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL 17 client
        run: |
          # Use the official PostgreSQL apt repo (PGDG) with the modern keyring approach
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          # Confirm we got version 17
          pg_dump --version

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_BACKUP_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_BACKUP_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Run database backup
        env:
          NEON_DIRECT_URL: ${{ secrets.NEON_DIRECT_URL }}
          BACKUP_BUCKET: rmbl-hub-backups
        run: bash scripts/backup-database.sh

      - name: Verify backup is recent
        env:
          BACKUP_BUCKET: rmbl-hub-backups
        run: bash scripts/verify-backup-recency.sh
